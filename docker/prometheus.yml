global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'api-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-service:8080']

  - job_name: 'worker-1'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['worker-1:8080']

  - job_name: 'worker-2'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['worker-2:8080']

  - job_name: 'worker-3'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['worker-3:8080']
